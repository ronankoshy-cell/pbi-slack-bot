name: Power BI Snapshot Bot
on:
  schedule:
    - cron: '0 7 * * 1-5' # Runs at 7:00 AM UTC, Mon-Fri
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Define environment variables for the entire job here
    env:
      POWERBI_URL: ${{ secrets.POWERBI_URL }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium slack_sdk webdriver-manager

      - name: Run Snapshot Script
        run: python snapshot.py
