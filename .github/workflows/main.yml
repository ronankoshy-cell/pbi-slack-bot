name: Power BI Snapshot
on:
  schedule:
    - cron: '0 9 * * 1-5' # Runs at 9 AM UTC, Monday-Friday
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install selenium slack_sdk webdriver-manager

      - name: Run Snapshot
        env:
          PBI_URL: ${{ secrets.PBI_URL }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python snapshot.py
