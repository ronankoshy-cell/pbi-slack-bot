name: Daily App Funnel Relay
on:
  schedule:
    - cron: '0 7 * * *' # Runs at 7 AM UTC
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install slack_sdk requests
      - name: Run Relay
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          AUTOMATION_CHANNEL_ID: ${{ secrets.AUTOMATION_CHANNEL_ID }}
        run: python snapshot.py
