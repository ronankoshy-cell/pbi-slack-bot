name: Power BI Slack Relay
on:
  schedule:
    # Runs at 07:00 UTC (7 AM) every day
    - cron: '0 7 * * *'
  workflow_dispatch: # This allows you to click "Run workflow" manually to test

jobs:
  relay-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install slack_sdk requests

      - name: Run Relay Script
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RELAY_CHANNEL_ID: ${{ secrets.RELAY_CHANNEL_ID }}
        run: python snapshot.py
