name: Power BI Snapshot Bot
on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install selenium slack_sdk webdriver-manager

      - name: Run Snapshot
        env:
          POWERBI_URL: ${{ secrets.POWERBI_URL }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          # NEW SECRETS:
          PBI_USERNAME: ${{ secrets.PBI_USERNAME }}
          PBI_PASSWORD: ${{ secrets.PBI_PASSWORD }}
        run: python snapshot.py
