name: Power BI Slack Relay
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install slack_sdk requests
      - name: Run
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RELAY_CHANNEL_ID: ${{ secrets.RELAY_CHANNEL_ID }}
        run: python snapshot.py
